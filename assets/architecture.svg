<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 860" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar--head" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
    <marker id="arr-retry" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ffb454"/>
    </marker>
    <style>
      .box{rx:12;stroke-width:1.5}
      .lbl{fill:#e7ebf3;font-size:16px;font-weight:600}
      .sub{fill:#8a93a6;font-size:12px}
      .mdl{fill:#5c9dff;font-size:11px;font-weight:600}
      .flow{stroke:#8a93a6;stroke-width:2;fill:none}
      .lane{fill:#0e1119;stroke:#232838;stroke-width:1.5;rx:14}
      .lanettl{fill:#5b6478;font-size:12px;font-weight:700;letter-spacing:2px}
    </style>
  </defs>

  <rect x="0" y="0" width="1300" height="860" fill="#0b0d12"/>

  <!-- header -->
  <text x="40" y="52" fill="#ffffff" font-size="30" font-weight="800">🎬 AI Showrunner</text>
  <text x="40" y="80" fill="#8a93a6" font-size="15">Track 2 · one-line brief → finished 9:16 urban-suspense micro-drama · planner–orchestrator–executor–critic</text>
  <g transform="translate(915,36)">
    <rect x="0" y="0" width="150" height="26" rx="13" fill="#151a24" stroke="#232838"/>
    <text x="12" y="17" class="mdl">Qwen3.7-Max · brain</text>
    <rect x="160" y="0" width="200" height="26" rx="13" fill="#151a24" stroke="#232838"/>
    <text x="172" y="17" fill="#ff5c7a" font-size="11" font-weight="600">HappyHorse / Wan2.7 · video</text>
  </g>

  <!-- LANE 1: PLAN -->
  <rect class="lane" x="30" y="110" width="1240" height="150"/>
  <text x="52" y="134" class="lanettl">1 · PLAN &amp; STORYBOARD</text>

  <g transform="translate(60,150)">
    <rect class="box" width="150" height="76" fill="#141821" stroke="#2b3040"/>
    <text x="16" y="34" class="lbl">Brief</text>
    <text x="16" y="56" class="sub">one line + genre</text>
  </g>
  <line class="flow" x1="212" y1="188" x2="252" y2="188" marker-end="url(#ar--head)"/>
  <g transform="translate(254,150)">
    <rect class="box" width="180" height="76" fill="#141821" stroke="#2b3040"/>
    <text x="16" y="30" class="lbl">Planner</text>
    <text x="16" y="50" class="sub">StoryBible · characters</text>
    <text x="16" y="67" class="mdl">Qwen3.7-Max</text>
  </g>
  <g transform="translate(452,168)">
    <polygon points="0,20 22,0 44,20 22,40" fill="#2a1d24" stroke="#ff5c7a"/>
    <text x="-2" y="60" fill="#ff5c7a" font-size="10">approve</text>
  </g>
  <line class="flow" x1="500" y1="188" x2="530" y2="188" marker-end="url(#ar--head)"/>
  <g transform="translate(532,150)">
    <rect class="box" width="200" height="76" fill="#141821" stroke="#2b3040"/>
    <text x="16" y="30" class="lbl">Storyboard</text>
    <text x="16" y="50" class="sub">ShotSpec JSON · 景别/机位</text>
    <text x="16" y="67" class="mdl">Qwen3.7-Max</text>
  </g>
  <g transform="translate(750,168)">
    <polygon points="0,20 22,0 44,20 22,40" fill="#2a1d24" stroke="#ff5c7a"/>
    <text x="-2" y="60" fill="#ff5c7a" font-size="10">approve</text>
  </g>
  <line class="flow" x1="798" y1="188" x2="840" y2="188" marker-end="url(#ar--head)"/>
  <g transform="translate(842,150)">
    <rect class="box" width="200" height="76" fill="#141821" stroke="#38d39f"/>
    <text x="16" y="30" class="lbl">Consistency</text>
    <text x="16" y="50" class="sub">mint 1 reference frame/char</text>
    <text x="16" y="67" fill="#38d39f" font-size="11" font-weight="600">wan2.7 i2v first_frame</text>
  </g>
  <line class="flow" x1="942" y1="228" x2="942" y2="300" marker-end="url(#ar--head)"/>

  <!-- LANE 2: PER-SHOT LOOP -->
  <rect class="lane" x="30" y="300" width="1240" height="230"/>
  <text x="52" y="324" class="lanettl">2 · PER-SHOT · PARALLEL · SELF-CORRECTING</text>

  <g transform="translate(70,350)">
    <rect class="box" width="180" height="90" fill="#141821" stroke="#2b3040"/>
    <text x="16" y="32" class="lbl">PromptWriter</text>
    <text x="16" y="54" class="sub">appearance + style</text>
    <text x="16" y="72" class="sub">baked per shot</text>
  </g>
  <line class="flow" x1="252" y1="395" x2="300" y2="395" marker-end="url(#ar--head)"/>
  <g transform="translate(302,350)">
    <rect class="box" width="200" height="90" fill="#141821" stroke="#ff5c7a"/>
    <text x="16" y="32" class="lbl">Executor</text>
    <text x="16" y="54" class="sub">async task → poll → download</text>
    <text x="16" y="72" fill="#ff5c7a" font-size="11" font-weight="600">HappyHorse / Wan2.7 i2v</text>
  </g>
  <line class="flow" x1="504" y1="395" x2="552" y2="395" marker-end="url(#ar--head)"/>
  <g transform="translate(554,350)">
    <rect class="box" width="210" height="90" fill="#141821" stroke="#5c9dff"/>
    <text x="16" y="32" class="lbl">Critic</text>
    <text x="16" y="54" class="sub">3-frame QA: narrative /</text>
    <text x="16" y="72" class="sub">consistency / quality → pass?</text>
    <text x="120" y="32" class="mdl">Qwen-VL</text>
  </g>
  <!-- pass -->
  <line class="flow" x1="766" y1="395" x2="820" y2="395" marker-end="url(#ar--head)"/>
  <text x="772" y="386" fill="#38d39f" font-size="11">pass</text>
  <g transform="translate(822,358)">
    <rect class="box" width="150" height="74" fill="#12241d" stroke="#38d39f"/>
    <text x="16" y="30" class="lbl">Keep clip</text>
    <text x="16" y="52" class="sub">+ QAReport JSON</text>
  </g>
  <!-- retry loop -->
  <path class="flow" style="stroke:#ffb454" d="M659,442 L659,486 L172,486 L172,442" marker-end="url(#arr-retry)"/>
  <text x="360" y="480" fill="#ffb454" font-size="12" font-weight="600">fail → targeted prompt rewrite → regenerate (≤2×)</text>

  <line class="flow" x1="897" y1="432" x2="897" y2="560" marker-end="url(#ar--head)"/>

  <!-- LANE 3: EDIT + LOCALIZE -->
  <rect class="lane" x="30" y="560" width="1240" height="170"/>
  <text x="52" y="584" class="lanettl">3 · EDIT · LOCALIZE · DELIVER</text>

  <g transform="translate(70,600)">
    <rect class="box" width="190" height="90" fill="#141821" stroke="#2b3040"/>
    <text x="16" y="32" class="lbl">Editor</text>
    <text x="16" y="54" class="sub">normalize · concat</text>
    <text x="16" y="72" class="sub">bilingual burn (Pillow+overlay)</text>
  </g>
  <line class="flow" x1="262" y1="645" x2="305" y2="645" marker-end="url(#ar--head)"/>
  <g transform="translate(307,600)">
    <rect class="box" width="190" height="90" fill="#141821" stroke="#2b3040"/>
    <text x="16" y="32" class="lbl">Localizer</text>
    <text x="16" y="54" class="sub">1 script → N languages</text>
    <text x="16" y="72" class="mdl">Qwen3.7-Max</text>
  </g>
  <g transform="translate(515,625)">
    <polygon points="0,20 22,0 44,20 22,40" fill="#2a1d24" stroke="#ff5c7a"/>
    <text x="-6" y="60" fill="#ff5c7a" font-size="10">final ok</text>
  </g>
  <line class="flow" x1="562" y1="645" x2="605" y2="645" marker-end="url(#ar--head)"/>
  <g transform="translate(607,600)">
    <rect class="box" width="240" height="90" fill="#12241d" stroke="#38d39f"/>
    <text x="16" y="32" class="lbl">final.mp4</text>
    <text x="16" y="54" class="sub">9:16 · burned + soft subs</text>
    <text x="16" y="72" class="sub">+ cover.png + EDL</text>
  </g>

  <!-- store + dashboard -->
  <g transform="translate(900,585)">
    <rect x="0" y="0" width="360" height="128" rx="14" fill="#0e1119" stroke="#232838"/>
    <text x="18" y="28" fill="#5b6478" font-size="12" font-weight="700" letter-spacing="2">OBSERVABILITY</text>
    <rect x="18" y="44" width="150" height="64" rx="10" fill="#141821" stroke="#2b3040"/>
    <text x="32" y="70" class="lbl" font-size="14">runs/ store</text>
    <text x="32" y="90" class="sub">JSON · events.jsonl</text>
    <rect x="192" y="44" width="150" height="64" rx="10" fill="#141821" stroke="#2b3040"/>
    <text x="206" y="70" class="lbl" font-size="14">Dashboard</text>
    <text x="206" y="90" class="sub">FastAPI · live tree</text>
    <line class="flow" x1="168" y1="76" x2="190" y2="76" marker-end="url(#ar--head)"/>
  </g>
  <path class="flow" style="stroke:#2b3040;stroke-dasharray:4 4" d="M942,432 C1080,470 1080,520 1080,583" marker-end="url(#ar--head)"/>

  <text x="40" y="800" fill="#5b6478" font-size="12">Every artifact is replayable JSON → any single shot re-generates without redoing the pipeline · 3 human-in-the-loop gates · deployed on Alibaba Cloud ECS</text>
</svg>
